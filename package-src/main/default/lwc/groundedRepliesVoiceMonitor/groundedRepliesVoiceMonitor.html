<template>
    <lightning-card title={cardTitle} icon-name={cardIcon}>
        <div slot="actions" class="slds-grid slds-gutters_x-small actions-bar">
            <template if:true={showActionButton}>
                <span class={estadoClasse} title={estadoLabel}></span>
                <lightning-button
                    label={actionLabel}
                    variant="neutral"
                    onclick={handleActionClick}
                    disabled={isLoading}
                ></lightning-button>
            </template>
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Atualizar"
                title="Atualizar agora"
                onclick={handleManualRefresh}
                disabled={isLoading}
            ></lightning-button-icon>
        </div>

        <template if:true={showVoiceToolkit}>
            <lightning-service-cloud-voice-toolkit-api
                ontranscript={handleVoiceConversationEvent}
                oncallstarted={handleVoiceConversationEvent}
                oncallconnected={handleVoiceConversationEvent}
                oncallended={handleVoiceConversationEvent}
                onerror={handleVoiceToolkitError}
            ></lightning-service-cloud-voice-toolkit-api>
        </template>

        <div class="container slds-p-around_medium">
            <div class="status-panel slds-m-bottom_medium">
                <div class="contador-bloco">
                    <span class="contador-label">Sentimento</span>
                    <span class={sentimentoBadgeClasse} title={sentimentoTooltip}>
                        <span aria-hidden="true">{sentimentoEmoji}</span>
                        <span class="slds-m-left_xx-small">{sentimentoLabel}</span>
                    </span>
                </div>
            </div>
            <div class="barra-progresso slds-m-bottom_medium">
                <div class="barra-progresso-preenchimento" style={progressoStyle}></div>
            </div>

            <template if:true={showDebugPanel}>
                <div class="debug-panel slds-m-bottom_medium">
                    <div class="debug-title">Depuracao</div>
                    <template if:true={debugLogs.length}>
                        <ul class="debug-list">
                            <template for:each={debugLogs} for:item="entry">
                                <li key={entry} class="debug-item">{entry}</li>
                            </template>
                        </ul>
                    </template>
                    <template if:false={debugLogs.length}>
                        <p class="slds-text-color_weak">Nenhum evento de depuracao registrado ainda.</p>
                    </template>
                </div>
            </template>

            <template if:true={isLoading}>
                <lightning-spinner size="small" alternative-text="Gerando recomendações"></lightning-spinner>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_alert slds-theme_error slds-m-bottom_small" role="alert">
                    <span class="slds-assistive-text">Erro</span>
                    <h2>{errorMessage}</h2>
                </div>
            </template>

            <template if:true={recommendations.length}>
                <h3 class="section-title slds-m-bottom_small">Recomendacoes de resposta</h3>
                <ul class="recommendations-list">
                    <template for:each={recommendations} for:item="item">
                        <li key={item.rowKey} class="recommendation-card slds-p-around_small slds-m-bottom_small">
                            <p class="recommendation-text">{item.text}</p>
                            <template if:true={item.sourceRecordId}>
                                <div class="knowledge-row slds-m-top_x-small">
                                    <lightning-icon
                                        icon-name="utility:knowledge_base"
                                        size="xx-small"
                                        alternative-text="Base de conhecimento"
                                        class="knowledge-icon"
                                    ></lightning-icon>
                                    <button
                                        class="knowledge-link"
                                        type="button"
                                        title={item.knowledgeTooltip}
                                        data-article-id={item.sourceRecordId}
                                        onclick={handleKnowledgeClick}
                                        disabled={item.disableKnowledgeButton}
                                    >
                                        Base de conhecimento
                                    </button>
                                </div>
                            </template>
                        </li>
                    </template>
                </ul>

                <div class="feedback-panel slds-m-top_small">
                    <span class="feedback-label">Essas sugestoes ajudaram?</span>
                    <lightning-button-icon
                        icon-name="utility:like"
                        alternative-text="Feedback positivo"
                        title="Feedback positivo"
                        onclick={handleThumbsUp}
                        disabled={feedbackDisabled}
                        variant={thumbsUpVariant}
                        class="slds-m-left_x-small"
                    ></lightning-button-icon>
                    <lightning-button-icon
                        icon-name="utility:dislike"
                        alternative-text="Feedback negativo"
                        title="Feedback negativo"
                        onclick={handleThumbsDown}
                        disabled={feedbackDisabled}
                        variant={thumbsDownVariant}
                        class="slds-m-left_x-small"
                    ></lightning-button-icon>
                </div>
            </template>

            <template if:false={recommendations.length}>
                <p class="slds-text-color_weak">Aguardando conteúdo para gerar recomendações grounded.</p>
            </template>
        </div>

        <template if:true={showNegativeFeedbackModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-modal__title slds-hyphenate">Feedback negativo</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-m-bottom_small">Selecione os motivos:</p>
                        <lightning-checkbox-group
                            options={negativeFeedbackOptions}
                            value={selectedNegativeReasons}
                            onchange={handleNegativeReasonChange}
                        ></lightning-checkbox-group>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button
                            variant="neutral"
                            label="Cancelar"
                            onclick={closeNegativeFeedbackModal}
                            disabled={isSavingFeedback}
                        ></lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Enviar feedback"
                            class="slds-m-left_small"
                            onclick={confirmNegativeFeedback}
                            disabled={isSavingFeedback}
                        ></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
